version: "3.9"

# ══════════════════════════════════════════════════════════════
# BANKRSYNTH DOCKER COMPOSE — PRODUCTION
# Full stack: frontend + backend + redis + nginx
#
# Usage:
#   docker compose -f infrastructure/docker/docker-compose.yml up -d
#   docker compose -f infrastructure/docker/docker-compose.yml logs -f backend
# ══════════════════════════════════════════════════════════════

services:

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-http://frontend:3001}
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_data:/app/apps/backend/data
      - backend_memory:/app/apps/backend/memory
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3000}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3000}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Nginx (reverse proxy) ────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Certbot (run once to issue cert, then comment out) ───
  certbot:
    image: certbot/certbot:latest
    profiles: ["ssl"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    command: >
      certonly --webroot --webroot-path=/var/www/certbot
      --email ${SSL_EMAIL:-admin@example.com}
      --agree-tos --no-eff-email
      -d ${DOMAIN:-localhost}
      -d api.${DOMAIN:-localhost}

volumes:
  redis_data:
  backend_data:
  backend_memory:
  nginx_logs:
  certbot_www:
  certbot_conf:
