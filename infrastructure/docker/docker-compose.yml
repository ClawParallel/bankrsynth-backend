version: "3.9"

# ══════════════════════════════════════════════════════════════
# BANKRSYNTH DOCKER COMPOSE
# Full stack: frontend + backend + redis + nginx
# ══════════════════════════════════════════════════════════════

services:

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://frontend:3001
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_data:/app/apps/backend/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:3000
        - NEXT_PUBLIC_WS_URL=ws://localhost:3000
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx (reverse proxy) ────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend

volumes:
  redis_data:
  backend_data:
  nginx_logs:
