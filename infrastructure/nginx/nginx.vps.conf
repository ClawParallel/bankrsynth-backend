# ══════════════════════════════════════════════════════════════
# BANKRSYNTH VPS NGINX CONFIGURATION
# Supports: HTTPS, WebSocket, SSE, Rate Limiting, Gzip
#
# Replace YOUR_DOMAIN with your actual domain.
# Run certbot to populate SSL certificate paths.
#
# Install: sudo cp nginx.vps.conf /etc/nginx/sites-available/bankrsynth
#          sudo ln -s /etc/nginx/sites-available/bankrsynth /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════

# ─── Rate limiting zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=deploy:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=sse_conn:10m;

# ─── Upstream: Backend (PM2 on port 3000) ────────────────────
upstream bankrsynth_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ─── Upstream: Frontend (Next.js on port 3001 or Vercel) ─────
# Only needed if self-hosting frontend on the same VPS
upstream bankrsynth_frontend {
    server 127.0.0.1:3001;
    keepalive 16;
}

# ─── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN api.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Backend API server ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.YOUR_DOMAIN;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/api.YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # Health check — no rate limit, no auth
    location = /health {
        proxy_pass http://bankrsynth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # SSE Terminal stream — disable all buffering
    location /terminal/stream {
        limit_conn sse_conn 50;

        proxy_pass http://bankrsynth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical: disable all buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
        proxy_set_header X-Accel-Buffering no;

        # SSE-specific headers
        add_header Cache-Control no-cache always;
        add_header Content-Type text/event-stream always;
        add_header Access-Control-Allow-Origin * always;
    }

    # WebSocket (Socket.IO) — upgrade connection
    location /socket.io/ {
        proxy_pass http://bankrsynth_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
    }

    # Token deploy endpoint — strict rate limit
    location /launch {
        limit_req zone=deploy burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://bankrsynth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # All other API routes
    location / {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://bankrsynth_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ─── Frontend (if self-hosted, not Vercel) ────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://bankrsynth_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://bankrsynth_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
    }

    # All Next.js pages and API routes
    location / {
        proxy_pass http://bankrsynth_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}
